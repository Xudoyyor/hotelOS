spring.application.name=gateway-service
server.port=8080

# Swagger UI ga kirish asosiy manzili
springdoc.swagger-ui.path=/swagger-ui.html

# 1. AUTH SERVICE
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/api/auth/v3/api-docs

# 2. RECEPTION SERVICE
springdoc.swagger-ui.urls[1].name=Reception Service
springdoc.swagger-ui.urls[1].url=/api/reception/v3/api-docs

# 3. HOUSEKEEPING SERVICE
springdoc.swagger-ui.urls[2].name=Housekeeping Service
springdoc.swagger-ui.urls[2].url=/api/housekeeping/v3/api-docs

# 4. ROOM SERVICE
springdoc.swagger-ui.urls[3].name=Room Service
springdoc.swagger-ui.urls[3].url=/api/room-service/v3/api-docs

# 5. MAINTENANCE SERVICE
springdoc.swagger-ui.urls[4].name=Maintenance Service
springdoc.swagger-ui.urls[4].url=/api/maintenance/v3/api-docs



spring.security.user.name=admin
spring.security.user.password=admin
#



# ==================== GATEWAY ROUTES ====================

# 1. AUTH SERVICE MARSHRUTI
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://auth-service:8083
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

# 2. RECEPTION SERVICE MARSHRUTI
spring.cloud.gateway.server.webflux.routes[1].id=reception-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://reception-service:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/reception/**

# 3. HOUSEKEEPING SERVICE MARSHRUTI
spring.cloud.gateway.server.webflux.routes[2].id=housekeeping-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://housekeeping-service:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/housekeeping/**

# 4. ROOM SERVICE MARSHRUTI
spring.cloud.gateway.server.webflux.routes[3].id=room-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://room-service:9094
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/room-service/**

# 5. MAINTENANCE SERVICE MARSHRUTI
spring.cloud.gateway.server.webflux.routes[4].id=maintenance-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://maintenance-service:8085
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/maintenance/**